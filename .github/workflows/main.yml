name: MAC to M3U Converter

on:
  schedule:
    - cron: '0 0 * * *'  # Ejecutar diariamente a medianoche
  workflow_dispatch:     # Permitir ejecución manual

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run maclist script
        run: python maclist.py
        env:
          IPTV_URL: ${{ secrets.IPTV_URL }}      # 👈 Pasa el secret
          MAC_ADDRESS: ${{ secrets.MAC_ADDRESS }}  # 👈 Pasa el secret
          
